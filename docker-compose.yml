services:
  # ======================
  # CITY DB + SERVICE
  # ======================
  city-db:
    image: postgres:16
    container_name: city-db
    environment:
      POSTGRES_DB: city_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d city_db"]
      interval: 5s
      timeout: 5s
      retries: 20

  city-service:
    build:
      context: ./city-catalog-service
      dockerfile: Dockerfile
    container_name: city-service
    depends_on:
      city-db:
        condition: service_healthy
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: docker

  # ======================
  # REDIS
  # ======================
  redis:
    image: redis:7
    container_name: travel-redis
    ports:
      - "6379:6379"

  # ======================
  # POI DB + SERVICE
  # ======================
  poi-db:
    image: postgres:16
    container_name: poi-db
    environment:
      POSTGRES_DB: poi_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d poi_db"]
      interval: 5s
      timeout: 5s
      retries: 20

  poi-service:
    build:
      context: ./poi-content-service
      dockerfile: Dockerfile
    container_name: poi-service
    depends_on:
      poi-db:
        condition: service_healthy
      redis:
        condition: service_started
      city-service:
        condition: service_started
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    restart: unless-stopped

  # ======================
  # REVIEW DB + SERVICE
  # ======================
  review-db:
    image: postgres:16
    container_name: review-db
    environment:
      POSTGRES_DB: travel_review_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    ports:
      - "5436:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d travel_review_db" ]
      interval: 5s
      timeout: 5s
      retries: 20

  review-service:
    build:
      context: ./review-report-service
      dockerfile: Dockerfile
    container_name: review-service
    depends_on:
      review-db:
        condition: service_healthy
      poi-service:
        condition: service_started
      city-service:
        condition: service_started
      redis:
        condition: service_started
      # auth-service если он будет в этом compose:
      # auth-service:
      #   condition: service_started
    ports:
      - "8083:8083"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    restart: unless-stopped