services:
  # ======================
  # CITY DB + SERVICE
  # ======================
  city-db:
    image: postgres:16
    container_name: city-db
    environment:
      POSTGRES_DB: city_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d city_db"]
      interval: 5s
      timeout: 5s
      retries: 20

  city-service:
    build:
      context: ./city-catalog-service
      dockerfile: Dockerfile
    container_name: city-service
    depends_on:
      city-db:
        condition: service_healthy
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: docker

  # =========================
  # POI DATABASE
  # =========================
  poi-db:
    image: postgres:16
    container_name: poi-db
    environment:
      POSTGRES_DB: poi_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d poi_db" ]
      interval: 5s
      timeout: 5s
      retries: 20

  # =========================
  # REDIS (for POI cache)
  # =========================
  redis:
    image: redis:7-alpine
    container_name: redis
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 20

  # =========================
  # POI SERVICE
  # =========================
  poi-service:
    build:
      context: ./poi-content-service
      dockerfile: Dockerfile
    container_name: poi-service
    depends_on:
      poi-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-service:
        condition: service_started
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: docker

      SPRING_DATASOURCE_URL: jdbc:postgresql://poi-db:5432/poi_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 1234

      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      POI_CACHE_TTL_MS: 600000

      # для фильтра /users/me
      AUTH_SERVICE_URL: http://auth-service:8084/api

      # если зовёшь city/review
      CITY_SERVICE_URL: http://city-service:8082/api/cities
      REVIEW_SERVICE_URL: http://review-service:8083/api/review

  # ======================
  # REVIEW DB + SERVICE
  # ======================
  review-db:
    image: postgres:16
    container_name: review-db
    environment:
      POSTGRES_DB: travel_review_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    ports:
      - "5436:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d travel_review_db" ]
      interval: 5s
      timeout: 5s
      retries: 20

  review-service:
    build:
      context: ./review-report-service
      dockerfile: Dockerfile
    container_name: review-service
    depends_on:
      review-db:
        condition: service_healthy
      poi-service:
        condition: service_started
      city-service:
        condition: service_started
      redis:
        condition: service_started
      # auth-service если он будет в этом compose:
      # auth-service:
      #   condition: service_started
    ports:
      - "8083:8083"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    restart: unless-stopped