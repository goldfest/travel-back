spring:
  cache:
    type: redis
    redis:
      time-to-live: ${POI_CACHE_TTL_MS:600000} # 10 минут (лучше, чем 60 сек)
      cache-null-values: false

  redis:
    host: ${SPRING_REDIS_HOST:redis}
    port: ${SPRING_REDIS_PORT:6379}
    timeout: 2000
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0

services:
  city:
    base-url: ${CITY_SERVICE_URL:http://city-service:8082/api/cities}
  auth:
    base-url: ${AUTH_API_URL:http://auth-service:8084/api/auth}
  review:
    base-url: ${REVIEW_SERVICE_URL:http://review-service:8083/api/review}

auth-service:
  base-url: ${AUTH_SERVICE_URL:http://auth-service:8084}