server:
  port: 8081
  servlet:
    context-path: /api/poi

spring:
  application:
    name: poi-content-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/poi_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:1234}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
    show-sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  cache:
    type: ${SPRING_CACHE_TYPE:simple}

  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

services:
  city:
    base-url: ${CITY_SERVICE_URL:http://localhost:8082/api/cities}
  review:
    base-url: ${REVIEW_SERVICE_URL:http://localhost:8083/api/reviews}
  auth:
    url: http://auth-service:8084/api
    me-path: /internal/users/me
    info-path: /internal/users/{id}/info
    exists-path: /internal/users/{id}/exists

