server:
  port: ${SERVER_PORT:8085}
  servlet:
    context-path: /api/personalization

spring:
  application:
    name: personalization-history-service

  profiles:
    active: dev

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/personalization_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:5558}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 20
          time_zone: UTC
        order_inserts: true
        order_updates: true
        format_sql: true
    show-sql: ${SHOW_SQL:false}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms

  cache:
    type: ${SPRING_CACHE_TYPE:simple}

services:
  auth:
    url: ${AUTH_SERVICE_URL:http://localhost:8084/api}
    me-path: /internal/users/me
    info-path: /internal/users/{id}/info
    exists-path: /internal/users/{id}/exists

  poi:
    base-url: ${POI_SERVICE_URL:http://localhost:8081/api/poi}

  city:
    base-url: ${CITY_SERVICE_URL:http://localhost:8082/api/cities}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.travelapp.personalization: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: ${SHOW_SQL:false}
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

app:
  cache:
    favorites:
      ttl: 1800
    collections:
      ttl: 3600
    search-history:
      ttl: 900
  history:
    days-to-keep: 30
  cors:
    allowed-origins: "*"